<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement - Ebook Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <i class="fas fa-book-open"></i>
                <h1>Ebook Library</h1>
            </div>
        </div>
    </header>

    <main>
        <div class="checkout-container">
            <h2>Finaliser votre achat</h2>
            
            <div class="checkout-content">
                <div class="checkout-form">
                    <h3>Informations personnelles</h3>
                    <form id="paymentForm" onsubmit="processPayment(event)">
                        <div class="form-group">
                            <label>Nom :</label>
                            <input type="text" id="nom" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Prénom :</label>
                            <input type="text" id="prenom" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Email :</label>
                            <input type="email" id="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Téléphone :</label>
                            <input type="tel" id="telephone" required>
                        </div>
                        
                        <div class="payment-methods">
                            <h4>Mode de paiement</h4>
                            <label class="payment-option">
                                <input type="radio" name="payment" value="wave" checked>
                                <i class="fas fa-mobile-alt"></i> Wave
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment" value="orange">
                                <i class="fas fa-mobile-alt"></i> Orange Money
                            </label>
                        </div>
                        
                        <div class="form-group">
                            <label>Numéro de téléphone pour le paiement :</label>
                            <input type="tel" id="paymentPhone" placeholder="77XXXXXXX" required>
                        </div>
                        
                        <button type="submit" class="pay-btn">Payer</button>
                    </form>
                </div>
                
                <div class="order-summary">
                    <h3>Récapitulatif</h3>
                    <div id="orderDetails"></div>
                </div>
            </div>
            
            <div class="payment-success" id="paymentSuccess" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <h3>Paiement effectué avec succès !</h3>
                <p>Veuillez envoyer la preuve de paiement sur WhatsApp pour recevoir votre ebook.</p>
                <a href="https://wa.me/221XXXXXXXXX?text=Bonjour%2C%20je%20viens%20d%27effectuer%20un%20paiement%20pour%20l%27ebook%20..." 
                   class="whatsapp-btn" target="_blank">
                    <i class="fab fa-whatsapp"></i> Envoyer la preuve sur WhatsApp
                </a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
